<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-section">
                <h1>Habit Tracker</h1>
                <p>Build your Consistency for better you!</p>
            </div>

            <div class="habit-input-section">
                <input 
                type="text"
                id="habitinput"
                placeholder="Add a habit : "/>

                <button id="addHabitBtn">
                    Add Habit
                </button>

            </div>

        </div>

        <div class="week-navigation">

        <div class="nav-buttons">
        <button id="prevWeek">Previous</button>
        <button id="nextWeek">Next</button>
        </div>

        <div id="weekLabel"></div>

        <button id="currentWeekBtn">
        Current Week
        </button>

    </div>
    
    <div id="app"></div>

    </div>

<script src="script.js"></script>

</body>
</html>
